<div class="ct_px_28 mt-4">
  <div class="my-books-container portal-font-main ">
  <!-- Section Title -->
  <div class="section-header">
    <h2 class="section-title">My Books</h2>
    <p class="section-subtitle">Track your reading progress and view Islamic studies textbooks.</p>
  </div>

  <!-- Filter tabs -->
  <div class="portal-tabs">
    <button 
      (click)="setFilter('All')" 
      class="portal-tab-btn" 
      [class.active]="selectedFilter === 'All'">All Books</button>
    <button 
      (click)="setFilter('Pending')" 
      class="portal-tab-btn" 
      [class.active]="selectedFilter === 'Pending'">Currently Reading</button>
    <button 
      (click)="setFilter('Completed')" 
      class="portal-tab-btn" 
      [class.active]="selectedFilter === 'Completed'">Completed</button>
    <button 
      (click)="setFilter('Pending')" 
      class="portal-tab-btn" 
      [class.active]="selectedFilter === 'Pending'">Not Started</button>
  </div>

  <!-- Grid of books -->
  <div class="books-grid">
    <div class="book-card portal-card" *ngFor="let book of filteredBooks()">
      <div class="book-cover-wrapper">
        <img [src]="book.coverImage" [alt]="book.title" class="book-cover-img" />
        <span class="status-badge" [class.badge-completed]="book.status === 'Completed'" [class.badge-pending]="book.status === 'Reading'" [class.badge-overdue]="book.status === 'Pending'">
          {{ book.status }}
        </span>
      </div>
      
      <div class="book-details">
        <span class="book-category">{{ book.category }} • {{ book.grade }}</span>
        <h3 class="book-title">{{ book.title }}</h3>
        
        <div class="book-progress-wrapper">
          <div class="progress-info">
            <span class="progress-percentage">{{ book.progress }}% Complete</span>
            <span class="progress-pages">Page {{ book.currentPage }} of {{ book.totalPages }}</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" [style.width.%]="book.progress"></div>
          </div>
        </div>

        <div class="book-actions">
          <button class="portal-btn portal-btn-primary book-action-btn">
            <i class="fa-solid" [class.fa-book-open]="book.status !== 'Completed'" [class.fa-rotate-right]="book.status === 'Completed'"></i>
            {{ book.status === 'Completed' ? 'Read Again' : 'Continue Reading' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>
