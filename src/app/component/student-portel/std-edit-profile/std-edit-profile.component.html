<div class="ct_px_28 profile-container pb-5">
  <div class="mb-3 pt-2">
    <a routerLink="/student/std-dashboard" class="back-link">
      <i class="fa-solid fa-angle-left me-1"></i> Edit profile
    </a>
  </div>

  <div class="profile-banner-card mb-4">
    <div class="banner-img-container">
      <img src="assets/img/mosque.png" alt="" class="banner-img"
        onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(135deg, #E2D3C4 0%, #B8A08E 100%)';" />
    </div>
    <div class="profile-avatar-section">
      <div class="avatar-wrapper">
        <img src="assets/img/boy.jpg" alt="Profile" class="avatar-img" />
      </div>
      <button type="button" class="portal-btn portal-btn-outline change-photo-btn ct_orange_outline">
        <i class="fa-solid fa-camera me-2"></i> Change Photo
      </button>
    </div>
  </div>

  <div class="dashboard-card form-card mb-4">
    <div class="p-4">
      <h3 class="section-title mb-4">Student Information</h3>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control-custom" value="Ali" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control-custom" value="Khan" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select class="form-control-custom form-select-custom">
              <option>Male</option>
              <option>Female</option>
            </select>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control-custom" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="dashboard-card form-card mb-4">
    <div class="p-4">
      <h3 class="section-title mb-4">Parent Information</h3>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control-custom" value="Ali" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control-custom" value="Khan" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control-custom" value="ahmedkhan@email.com" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="text" class="form-control-custom" value="+1 (610) 977-1700" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-end gap-3 mt-4 mb-4">
    <button type="button" class="portal-btn portal-btn-outline px-4">Cancel</button>
    <button type="button" class="portal-btn portal-btn-primary px-4">Save Changes</button>
  </div>
</div>
