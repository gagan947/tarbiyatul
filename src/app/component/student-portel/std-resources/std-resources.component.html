<div class="ct_px_28 mt-4">
  <div class="resources-page-container portal-font-main">
    <!-- Section Title -->
    <div class="section-header">
      <h2 class="section-title">Resources</h2>
      <p class="section-subtitle">
        Access trusted educational websites recommended by your teachers.
      </p>
    </div>

    <!-- Filter Category Tabs -->
    <div class="resourses_tab">
      <button
        (click)="setFilter('All')"
        class="portal-tab-btn"
        [class.active]="selectedFilter === 'All'"
      >
        All Resources
      </button>
      <button
        (click)="setFilter('Reading')"
        class="portal-tab-btn"
        [class.active]="selectedFilter === 'Reading'"
      >
        Reading
      </button>
      <button
        (click)="setFilter('Mathematics')"
        class="portal-tab-btn"
        [class.active]="selectedFilter === 'Mathematics'"
      >
        Mathematics
      </button>
      <button
        (click)="setFilter('Science')"
        class="portal-tab-btn"
        [class.active]="selectedFilter === 'Science'"
      >
        Science
      </button>
    </div>

    <!-- Sections of Resources -->

    <!-- MATHEMATICS SECTION -->
    <div
      class="resource-section-block"
      *ngIf="selectedFilter === 'All' || selectedFilter === 'Mathematics'"
    >
      <h3 class="section-category-title">
        <svg
          width="18"
          height="22"
          viewBox="0 0 18 22"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M12.2616 5.27794H5.40444L3.11872 20.8335M12.2616 16.3891V13.0557M8.83301 16.3891H8.84444M5.40444 16.3891H5.41587M5.40444 13.0557H5.41587M8.83301 13.0557H8.84444M12.2616 9.72239H12.273M8.83301 9.72239H8.84444M5.40444 9.72239H5.41587M3.11872 20.8335H14.5473C15.8097 20.8335 16.833 19.8386 16.833 18.6113V3.05572C16.833 1.82842 15.8097 0.833496 14.5473 0.833496H3.11872C1.85636 0.833496 0.833008 1.82842 0.833008 3.05572V18.6113C0.833008 19.8386 1.85636 20.8335 3.11872 20.8335Z"
            stroke="#FC800A"
            stroke-width="1.66667"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Mathematics Resources
      </h3>
      <div class="resources-grid">
        <div
          class="resource-card portal-card"
          *ngFor="let res of resources | slice: 0 : 4"
          [class.active-highlight]="res.id === activeResourceId"
          (click)="selectResource(res)"
        >
          <div class="card-top-header">
            <div class="resource-logo-box">
              <div [innerHTML]="res.logoClass"></div>
            </div>
            <a
              [href]="res.url"
              target="_blank"
              class="external-link-icon"
              aria-label="Open Link"
              (click)="$event.stopPropagation()"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M5.91699 2.4165H2.41699C1.45114 2.4165 0.666992 3.20065 0.666992 4.1665V12.9165C0.666992 13.8824 1.45114 14.6665 2.41699 14.6665H11.167C12.1328 14.6665 12.917 13.8824 12.917 12.9165V9.4165M14.667 5.9165V0.666504H9.41699M14.667 0.666504L5.91699 9.4165"
                  stroke="#9CA3AF"
                  stroke-width="1.33333"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </a>
          </div>

          <h4 class="resource-card-name">{{ res.title }}</h4>
          <p class="resource-card-desc">{{ res.description }}</p>
        </div>
      </div>
    </div>

    <!-- READING SECTION -->
    <div
      class="resource-section-block"
      *ngIf="selectedFilter === 'All' || selectedFilter === 'Reading'"
    >
      <h3 class="section-category-title">
        <svg width="22" height="18" viewBox="0 0 22 18" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M10.8588 2.22931V16.711M10.8588 16.711C12.1599 15.8466 13.9267 15.3152 15.8717 15.3152C17.8178 15.3152 19.5835 15.8466 20.8846 16.711V2.22931C19.5835 1.36486 17.8178 0.833496 15.8717 0.833496C13.9267 0.833496 12.1599 1.36486 10.8588 2.22931C9.55767 1.36486 7.7909 0.833496 5.8459 0.833496C3.9009 0.833496 2.13413 1.36486 0.833008 2.22931V16.711C2.13413 15.8466 3.9009 15.3152 5.8459 15.3152C7.7909 15.3152 9.55767 15.8466 10.8588 16.711Z" stroke="#FC800A" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
 Reading Resources
      </h3>
      <div class="resources-grid">
        <div
          class="resource-card portal-card"
          *ngFor="let res of resources | slice: 4 : 10"
          [class.active-highlight]="res.id === activeResourceId"
          (click)="selectResource(res)"
        >
          <div class="card-top-header">
            <div
              class="resource-logo-box"
            
            >
              <div [innerHTML]="res.logoClass"></div>
            </div>
            <a
              [href]="res.url"
              target="_blank"
              class="external-link-icon"
              aria-label="Open Link"
              (click)="$event.stopPropagation()"
            >
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
          </div>

         <a  [href]="res.url"   target="_blank"  aria-label="Open Link"
              (click)="$event.stopPropagation()"> <h4 class="resource-card-name">{{ res.title }}</h4></a>
          <p class="resource-card-desc">{{ res.description }}</p>
        </div>
      </div>
    </div>

    <!-- SCIENCE SECTION -->
    <div
      class="resource-section-block"
      *ngIf="selectedFilter === 'All' || selectedFilter === 'Science'"
    >
      <h3 class="section-category-title">
        <svg width="18" height="22" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
<path d="M12.2616 5.27794H5.40444L3.11872 20.8335M12.2616 16.3891V13.0557M8.83301 16.3891H8.84444M5.40444 16.3891H5.41587M5.40444 13.0557H5.41587M8.83301 13.0557H8.84444M12.2616 9.72239H12.273M8.83301 9.72239H8.84444M5.40444 9.72239H5.41587M3.11872 20.8335H14.5473C15.8097 20.8335 16.833 19.8386 16.833 18.6113V3.05572C16.833 1.82842 15.8097 0.833496 14.5473 0.833496H3.11872C1.85636 0.833496 0.833008 1.82842 0.833008 3.05572V18.6113C0.833008 19.8386 1.85636 20.8335 3.11872 20.8335Z" stroke="#FC800A" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
 Science Resources
      </h3>
      <div class="resources-grid">
        <div
          class="resource-card portal-card"
          *ngFor="let res of resources | slice: 10 : 13"
          [class.active-highlight]="res.id === activeResourceId"
          (click)="selectResource(res)"
        >
          <div class="card-top-header">
            <div
              class="resource-logo-box"
           
            >
             <div [innerHTML]="res.logoClass"></div>
            </div>
            <a
              [href]="res.url"
              target="_blank"
              class="external-link-icon"
              aria-label="Open Link"
              (click)="$event.stopPropagation()"
            >
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
            </a>
          </div>

          <h4 class="resource-card-name">{{ res.title }}</h4>
          <p class="resource-card-desc">{{ res.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
