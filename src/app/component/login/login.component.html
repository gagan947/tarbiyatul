<app-header></app-header>
<div class="login-wrapper">
  <div class="login-card-container">
    <div class="login-card">

      <!-- Brand Logo Header -->
      <div class="login-header">
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Login to access your dashboard</p>
      </div>

      <!-- Alert Messages (Success/Error) -->
      <div *ngIf="errorMessage" class="alert alert-danger custom-alert" role="alert">
        <i class="fa-solid fa-circle-exclamation me-2"></i> {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="alert alert-success custom-alert" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i> {{ successMessage }}
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email Input Group -->
        <div class="form-group mb-4">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-container">
            <span class="input-icon">
              <i class="fa-regular fa-envelope"></i>
            </span>
            <input type="email" id="email" formControlName="email" class="form-control-custom"
              placeholder="name@example.com"
              [ngClass]="{ 'is-invalid-custom': (f['email'].invalid && (f['email'].dirty || f['email'].touched || submitted)) }"
              [attr.disabled]="isLoading ? true : null" />
          </div>
          <!-- Validation Messages -->
          <div *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched || submitted)" class="error-msg">
            <span *ngIf="f['email'].errors?.['required']">
              <i class="fa-solid fa-circle-info me-1"></i> Email is required
            </span>
            <span *ngIf="f['email'].errors?.['email']">
              <i class="fa-solid fa-circle-info me-1"></i> Please enter a valid email address
            </span>
          </div>
        </div>

        <!-- Password Input Group -->
        <div class="form-group mb-2">
          <div class="d-flex justify-content-between align-items-center mb-1">
            <label for="password" class="form-label mb-0">Password</label>
          </div>
          <div class="input-container">
            <span class="input-icon">
              <i class="fa-solid fa-lock"></i>
            </span>
            <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password"
              class="form-control-custom" placeholder="••••••••"
              [ngClass]="{ 'is-invalid-custom': (f['password'].invalid && (f['password'].dirty || f['password'].touched || submitted)) }"
              [attr.disabled]="isLoading ? true : null" />
            <button type="button" class="password-toggle-btn" (click)="togglePasswordVisibility()"
              aria-label="Toggle password visibility">
              <i class="fa-regular" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
          <div *ngIf="f['password'].invalid && (f['password'].dirty || f['password'].touched || submitted)"
            class="error-msg">
            <span *ngIf="f['password'].errors?.['required']">
              <i class="fa-solid fa-circle-info me-1"></i> Password is required
            </span>
          </div>
        </div>
        <div class="d-flex justify-content-end mb-4">
          <a routerLink="/forgotpassword" class="forgot-password-link-sub">Forgot Password?</a>
        </div>
        <button type="submit" class="login-btn w-100" [disabled]="isLoading || loginForm.invalid">
          <span *ngIf="!isLoading">Login</span>
          <span *ngIf="isLoading" class="spinner-container">
            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            Logging in...
          </span>
        </button>
      </form>
      <div class="signup-footer mt-4">
        Don't have an account? <a routerLink="/signup" class="signup-link">Sign Up</a>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
