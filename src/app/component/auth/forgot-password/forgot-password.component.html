<div class="auth-wrapper">
  <div class="container">
    <div class="row">
      <div class="col-md-8 mx-auto">
        <div class="auth-card-container">
          <div class="login-card w-100">

            <div class="ct_auth_white_bg">
              <!-- Brand Header -->
              <div class="auth-page-header">
                <h2 class="auth-title">Lost your password?</h2>
                <p class="auth-subtitle">Enter your email address to reset your password</p>
              </div>

              <!-- Reset Form -->
              <form (submit)="onSubmit($event)">
                <div class="form-group mb-4">
                  <label for="email" class="form-label">Email Address</label>
                  <div class="input-container">
                    <input type="email" id="email" class="form-control-custom" placeholder="name@example.com" required />
                  </div>
                </div>

                <button type="submit" class="auth-btn-primary w-100 mt-4">
                  Submit
                </button>
              </form>

            </div>

            <!-- Login footer redirect -->
            <div class="auth-footer mt-4">
              Already know your password? <a routerLink="/login" class="auth-link">Login</a>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
