<div class="ct_px_28 mt-4">
 <div class="mb-3 pt-2">
    <a routerLink="/parent/my-profile" class="back-link">
      <i class="fa-solid fa-angle-left me-1"></i> Change Password
    </a>
  </div>

  <div class="dashboard-card p-4 form-card">
    <form class="password-form">
      <div class="form-group mb-4">
        <label for="currentPassword" class="form-label">Current Password</label>
        <div class="input-container">
          <input type="password" id="currentPassword" class="form-control-custom" placeholder="••••••••" />
          <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <div class="form-group mb-4">
        <label for="newPassword" class="form-label">New Password</label>
        <div class="input-container">
          <input type="password" id="newPassword" class="form-control-custom" placeholder="••••••••" />
          <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <div class="form-group mb-5">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <div class="input-container">
          <input type="password" id="confirmPassword" class="form-control-custom" placeholder="••••••••" />
          <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
            <i class="fa-regular fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-3 mt-4">
        <button type="button" class="portal-btn portal-btn-outline px-4">Cancel</button>
        <button type="button" class="portal-btn portal-btn-primary px-4">Save Changes</button>
      </div>
    </form>
  </div>
</div>
