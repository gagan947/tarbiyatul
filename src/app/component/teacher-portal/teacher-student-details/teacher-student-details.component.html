<div class="ct_px_28 profile-container pb-5 pt-3">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-sm btn-outline-secondary rounded-circle" style="width: 36px; height: 36px;" (click)="goBack()">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <h2 class="mb-0 fw-semibold dash-section-title" style="font-size: 24px;">Student Profile</h2>
    </div>
  </div>

  <div class="dashboard-card mb-4 dash-card-shadow">
    <div class="row align-items-center">
      <div class="col-xl-6 col-lg-5 d-flex align-items-center gap-4 mb-4 mb-lg-0">
        <img [src]="student.avatar" alt="Avatar" class="student-profile-img" />
        <div>
          <h3 class="mb-1 fw-bold" style="font-size: 22px;">{{ student.name }}</h3>
          <p class="mb-1 text-muted">{{ student.grade }}</p>
          <div class="d-flex gap-3 text-muted flex-wrap" style="font-size: 14px;">
            <span><i class="fa-regular fa-envelope me-1"></i> {{ student.email }}</span>
            <span><i class="fa-solid fa-clipboard-user me-1"></i> {{ student.attendance }} Attendance</span>
          </div>
        </div>
      </div>
      <div class="col-xl-6 col-lg-7 d-flex justify-content-lg-end gap-2 flex-wrap">
        <button class="portal-btn portal-btn-outline px-4 rounded-pill text-nowrap" (click)="openChat()">
          <i class="fa-regular fa-comment-dots"></i> Message Student
        </button>
        <button class="portal-btn portal-btn-outline px-4 rounded-pill text-nowrap" (click)="openChat()">
          <i class="fa-solid fa-user-group"></i> Contact Parent
        </button>
        <button class="portal-btn portal-btn-primary px-4 rounded-pill text-nowrap" (click)="assignTask()">
          <i class="fa-solid fa-plus"></i> Assign Task
        </button>
      </div>
    </div>
  </div>

  <h4 class="mb-3 fw-semibold dash-section-title" style="font-size: 18px;">Assignment History</h4>
  
  <div class="dashboard-card h-100 dash-card-shadow">
    <div class="table-responsive">
      <table class="table align-middle dash-table">
        <thead>
          <tr>
            <th class="text-uppercase text-muted border-0 fw-medium pb-3 dash-table-th">Assignment</th>
            <th class="text-uppercase text-muted border-0 fw-medium pb-3 dash-table-th">Subject</th>
            <th class="text-uppercase text-muted border-0 fw-medium pb-3 dash-table-th">Due Date</th>
            <th class="text-uppercase text-muted border-0 fw-medium pb-3 dash-table-th">Status</th>
            <th class="text-uppercase text-muted border-0 fw-medium pb-3 text-end dash-table-th">Score</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of history; let i = index">
            <td class="border-0 py-3 fw-semibold dash-table-td-text" [class.border-top]="i !== 0" [class.dash-table-border-top]="i !== 0">
              {{ item.title }}
            </td>
            <td class="border-0 py-3 fw-semibold dash-table-td-text text-muted" [class.border-top]="i !== 0" [class.dash-table-border-top]="i !== 0">
              {{ item.subject }}
            </td>
            <td class="border-0 py-3 dash-table-td-text text-muted" [class.border-top]="i !== 0" [class.dash-table-border-top]="i !== 0">
              {{ item.dueDate }}
            </td>
            <td class="border-0 py-3" [class.border-top]="i !== 0" [class.dash-table-border-top]="i !== 0">
              <span class="badge" 
                    [class.dash-badge-completed]="item.status === 'Completed'"
                    [class.dash-badge-progress]="item.status === 'In Progress'"
                    [class.dash-badge-overdue]="item.status === 'Overdue'"
                    [class.dash-badge-notstarted]="item.status === 'Not Started'">
                {{ item.status }}
              </span>
            </td>
            <td class="border-0 py-3 text-end fw-bold" [class.border-top]="i !== 0" [class.dash-table-border-top]="i !== 0"
                [ngStyle]="{'color': item.status === 'Completed' ? '#3B82F6' : '#1A1F45'}">
              {{ item.score }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
